<form [formGroup]="doctorForm" (ngSubmit)="onSubmit()" class="p-3">
<div class="mb-3">
<label for="doctorId" class="form-label">Doctor ID</label>
<input id="doctorId" type="number" class="form-control" formControlName="doctorId" />
</div>
 
  <div class="mb-3">
<label for="fullName" class="form-label">Full Name</label>
<input id="fullName" type="text" class="form-control" formControlName="fullName" />
<div class="text-danger" *ngIf="fullName?.touched && fullName?.invalid">
      Full Name is required (min 2 characters).
</div>
</div>
 
  <div class="mb-3">
<label for="specialty" class="form-label">Specialty</label>
<input id="specialty" type="text" class="form-control" formControlName="specialty" />
<div class="text-danger" *ngIf="specialty?.touched && specialty?.invalid">
      Specialty is required.
</div>
</div>
 
  <div class="mb-3">
<label for="contactNumber" class="form-label">Contact Number</label>
<input id="contactNumber" type="text" class="form-control" formControlName="contactNumber" />
<div class="text-danger" *ngIf="contactNumber?.touched && contactNumber?.invalid">
      Contact Number is required and must be a 10-digit number.
</div>
</div>
 
  <div class="mb-3">
<label for="email" class="form-label">Email</label>
<input id="email" type="email" class="form-control" formControlName="email" />
<div class="text-danger" *ngIf="email?.touched && email?.invalid">
      A valid Email is required.
</div>
</div>
 
  <div class="mb-3">
<label for="yearsOfExperience" class="form-label">Years of Experience</label>
<input id="yearsOfExperience" type="number" class="form-control" formControlName="yearsOfExperience" />
<div class="text-danger" *ngIf="yearsOfExperience?.touched && yearsOfExperience?.invalid">
      Years of Experience is required and must be greater than 0.
</div>
</div>
 
  <div class="d-flex gap-2">
<button class="btn btn-primary" type="submit">Submit</button>
<button type="button" class="btn btn-secondary" (click)="resetForm()">Reset</button>
</div>
 
  <div class="alert alert-danger mt-3" *ngIf="errorMessage">{{ errorMessage }}</div>
 
  <!-- No leading/trailing whitespace inside the element -->
<div id="successMessage" class="alert alert-success mt-3 success-message" *ngIf="successMessage">{{ successMessage }}</div>
</form>
