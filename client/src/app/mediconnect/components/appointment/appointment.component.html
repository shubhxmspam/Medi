<app-navbar></app-navbar>

<div class="container py-3">
  <div class="card shadow-sm">
    <div class="card-body">
      <h4 class="mb-3">Create Appointment</h4>

      <form [formGroup]="appointmentForm" (ngSubmit)="onSubmit()">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Patient ID</label>
            <input class="form-control" formControlName="patientId" readonly>
          </div>

          <div class="col-md-8">
            <label class="form-label">Clinic</label>
            <select class="form-select" formControlName="clinicId">
              <option [ngValue]="null">-- Select Clinic --</option>
              <option *ngFor="let c of clinics" [ngValue]="c.clinicId">
                {{ c.clinicName }} ({{ c.location }})
              </option>
            </select>
            <div class="text-danger" *ngIf="clinicId?.touched && clinicId?.invalid">
              Please select a clinic.
            </div>
          </div>

          <div class="col-md-4">
            <label class="form-label">Appointment Date</label>
            <input type="datetime-local" class="form-control" formControlName="appointmentDate">
            <div class="text-danger" *ngIf="appointmentDate?.touched && appointmentDate?.invalid">
              Date/time is required.
            </div>
          </div>

          <div class="col-md-4">
            <label class="form-label">Status</label>
            <select class="form-select" formControlName="status">
              <option value="Scheduled">Scheduled</option>
              <option value="Completed">Completed</option>
              <option value="Canceled">Canceled</option>
            </select>
            <div class="text-danger" *ngIf="status?.touched && status?.invalid">
              Status is required.
            </div>
          </div>

          <div class="col-md-12">
            <label class="form-label">Purpose</label>
            <textarea rows="3" class="form-control" formControlName="purpose" placeholder="Purpose"></textarea>
            <div class="text-danger" *ngIf="purpose?.touched && purpose?.invalid">
              Purpose is required.
            </div>
          </div>
        </div>

        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-primary" [disabled]="appointmentForm.invalid">Submit</button>
          <a routerLink="/mediconnect/dashboard" class="btn btn-outline-secondary">Dashboard</a>
        </div>
      </form>

      <div class="alert alert-success mt-3" *ngIf="successMessage">{{ successMessage }}</div>
      <div class="alert alert-danger mt-3" *ngIf="errorMessage">{{ errorMessage }}</div>
    </div>
  </div>
</div>
