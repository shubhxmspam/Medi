<app-navbar></app-navbar>

<div class="container py-3">
  <div class="card shadow-sm">
    <div class="card-body">
      <h4 class="mb-3">Update Patient</h4>

      <form [formGroup]="patientForm" (ngSubmit)="onSubmit()">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input class="form-control" formControlName="fullName">
          </div>
          <div class="col-md-3">
            <label class="form-label">Username</label>
            <input class="form-control" formControlName="username">
          </div>
          <div class="col-md-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" formControlName="password" placeholder="Min 8, 1 uppercase, 1 number">
          </div>

          <div class="col-md-4">
            <label class="form-label">Date of Birth</label>
            <input type="date" class="form-control" formControlName="dateOfBirth">
          </div>

          <div class="col-md-4">
            <label class="form-label">Contact Number</label>
            <input class="form-control" formControlName="contactNumber">
          </div>

          <div class="col-md-4">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" formControlName="email">
          </div>

          <div class="col-md-12">
            <label class="form-label">Address</label>
            <textarea rows="3" class="form-control" formControlName="address"></textarea>
          </div>
        </div>

        <div class="d-flex gap-2 mt-3">
          <button class="btn btn-primary" type="submit" [disabled]="patientForm.invalid">Submit</button>
          <a routerLink="/mediconnect/dashboard" class="btn btn-outline-secondary">Dashboard</a>
        </div>
      </form>

      <div class="alert alert-success mt-3" *ngIf="successMessage">{{ successMessage }}</div>
      <div class="alert alert-danger mt-3" *ngIf="errorMessage">{{ errorMessage }}</div>
    </div>
  </div>
</div>
