<!-- Create Registeration form with input field  that has following id
registerName: this will represent the person name
registerEmail: this will represent the email id 
registerUsername: this will represent the  username 
registerPassword: this will represent the password
create a button and onclick you call function register() from validation.js

The form will contain the following validation rules ;
Every field is required 
registerUsername: it will not contain any special characters 
registerEmail: it will be a valid email
registerPassword: it will be of atleast 8 characters 
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="js/validation.js"></script>
</head>
<body>
    <h2>Register</h2>
    <form onsubmit="register(); return false;">
        <div class="mb-3">
            <label>Name</label>
            <input type="text" id="registerName" class="form-control">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="text" id="registerEmail" class="form-control">
        </div>

        <div class="mb-3">
            <label>Username</label>
            <input type="text" id="registerUsername" class="form-control">
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" id="registerPassword" class="form-control">
        </div>

        <button type="submit" class="btn btn-success">Register</button>
    </form>
</body>
</html>
