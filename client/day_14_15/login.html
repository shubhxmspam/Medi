<!-- Create login form Username and Password fields in login form
    where input fields has following cofigurations:
     - username will have  loginUsername id 
     - password field will have loginPassword id

    validate: 
    -loginUsername: should not be empty
    -loginPassword: should not be empty

-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="js/validation.js"></script>
</head>
<body class="container mt-5">
    <h2>Login</h2>

    <form onsubmit="login(); return false;">
        <div class="mb-3">
            <label>Username</label>
            <input type="text" id="loginUsername" class="form-control">
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" id="loginPassword" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">Login</button>
    </form>
</body>
</html>
